version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-topic-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-topic-init
    depends_on:
      - kafka
    entrypoint:
      - /bin/sh
      - -c
      - |
        until kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
          echo "Waiting for Kafka..."
          sleep 2
        done
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic ad-clicks --partitions 3 --replication-factor 1

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: vrani
      CLICKHOUSE_PASSWORD: veena
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
        nofile:
          soft: 262144
          hard: 262144

  jobmanager:
    image: flink:1.18.1-scala_2.12-java17
    container_name: jobmanager
    command: jobmanager
    depends_on:
      - kafka
      - clickhouse
    ports:
      - "8082:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager

  taskmanager:
    image: flink:1.18.1-scala_2.12-java17
    container_name: taskmanager
    command: taskmanager
    depends_on:
      - jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4

  job-submitter:
    image: flink:1.18.1-scala_2.12-java17
    container_name: job-submitter
    depends_on:
      - jobmanager
      - taskmanager
    volumes:
      - ./jobs:/jobs
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 30 &&
      flink run -m jobmanager:8081 /jobs/flink-job-1.0.0.jar
      "      

  redis-ui:
    image: rediscommander/redis-commander:latest
    platform: linux/amd64
    container_name: redis-ui
    depends_on:
      - redis
    ports:
      - "8083:8081"
    environment:
      REDIS_HOSTS: local:redis:6379

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8084:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  clickhouse-ui:
    image: spoonest/clickhouse-tabix-web-client:latest
    platform: linux/amd64
    container_name: clickhouse-ui
    depends_on:
      - clickhouse
    ports:
      - "8085:80"
volumes:
  clickhouse_data: